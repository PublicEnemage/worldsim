# WorldSim three-service local development stack
#
# Quickstart:
#   1. docker compose up
#   2. docker compose exec api alembic upgrade head
#   3. docker compose exec api python -m app.db.seed.natural_earth_loader
#   4. open http://localhost:5173

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: worldsim
      POSTGRES_USER: worldsim
      POSTGRES_PASSWORD: worldsim
    ports:
      - "5432:5432"
    volumes:
      - worldsim_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldsim -d worldsim"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://worldsim:worldsim@db:5432/worldsim
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api

volumes:
  worldsim_pgdata:
