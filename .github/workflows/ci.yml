name: WorldSim CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------------------------------------------------------------------------
  # Path filter — always runs, gates all downstream jobs.
  #
  # Uses dorny/paths-filter@v3 to detect which file groups changed.
  # Downstream jobs read the filter outputs via needs.changes.outputs.*
  # and include an `if:` condition so they are skipped entirely on
  # documentation-only commits (no PostGIS service spin-up, no pip install).
  #
  # Filter groups:
  #   backend     — any file under backend/ (triggers lint, test-backend,
  #                 compliance-scan)
  #   frontend    — any file under frontend/ (triggers lint, test-backend,
  #                 compliance-scan)
  #   backtesting — backend/tests/backtesting/** or backend/tests/fixtures/**
  #                 (triggers the full PostGIS backtesting job only when the
  #                 files that affect fidelity thresholds actually change)
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backtesting: ${{ steps.filter.outputs.backtesting }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            backtesting:
              - 'backend/tests/backtesting/**'
              - 'backend/tests/fixtures/**'

  test-backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          cd backend
          pytest tests/unit -v

      - name: Run integration tests
        run: |
          cd backend
          pytest tests/integration -v || [ $? -eq 5 ]

      - name: Run backtesting suite (skip without DATABASE_URL)
        run: |
          cd backend
          pytest tests/backtesting -v || [ $? -eq 5 ]

  # ---------------------------------------------------------------------------
  # Backtesting job — Greece 2010–2012 fidelity gate (ADR-004 Decision 3)
  #
  # Requires a live PostGIS database with seeded simulation_entities.
  # The GRC entity must exist — run natural_earth_loader before pytest.
  # A failure in this job is a build failure; it is the Milestone 3 exit
  # gate for the backtesting criterion (Issue #61, Issue #112).
  #
  # Only runs when backend/tests/backtesting/ or backend/tests/fixtures/
  # files change — these are the files that directly encode fidelity
  # thresholds. Changes to backend/app/ alone do not re-trigger this job
  # because test-backend already runs the backtesting suite without a live
  # DB (graceful skip when DATABASE_URL is absent). The full PostGIS run
  # is reserved for when the thresholds or fixture data themselves change.
  # ---------------------------------------------------------------------------
  backtesting:
    runs-on: ubuntu-latest
    needs: [changes, test-backend]
    if: needs.changes.outputs.backtesting == 'true'

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: worldsim
          POSTGRES_PASSWORD: worldsim
          POSTGRES_DB: worldsim
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://worldsim:worldsim@localhost:5432/worldsim

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: |
          cd backend
          alembic upgrade head

      - name: Seed Natural Earth data (creates GRC entity required by backtesting)
        run: |
          cd backend
          python -m app.db.seed.natural_earth_loader

      - name: Run Greece 2010–2012 backtesting suite
        run: |
          cd backend
          pytest -m backtesting --tb=short -v

  # ---------------------------------------------------------------------------
  # Playwright E2E job — M4 retrospective hard gate (Issue #190)
  #
  # Runs the three required Playwright flows against the full Docker Compose
  # stack: PostGIS database, FastAPI backend, and Vite frontend dev server.
  # Only triggers when files under frontend/ change — same paths-filter
  # pattern as the frontend group in the `changes` job.
  #
  # The frontend container runs `npm install && npm run dev` which can take
  # up to 8 minutes before port 5173 accepts connections. The wait-for-
  # frontend step polls for up to 500 seconds to accommodate this.
  #
  # The test seam `window.__worldsim_selectEntity` is available because the
  # Vite dev server runs in DEV mode (`import.meta.env.DEV = true`), which
  # is the same condition that gates the seam in App.tsx.
  #
  # Playwright is installed on the CI runner (not inside Docker) and
  # connects to localhost:5173 (frontend) and localhost:8000 (API) via the
  # Docker Compose published ports.
  # ---------------------------------------------------------------------------
  playwright-e2e:
    runs-on: ubuntu-latest
    needs: [changes, test-backend]
    if: needs.changes.outputs.frontend == 'true'
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for API at http://localhost:8000/api/v1/health/ ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health/ | grep -q '"status":"ok"'; then
              echo "API is healthy."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: API did not become healthy within 300s."
              docker compose logs api
              exit 1
            fi
            echo "  attempt $i/30 — retrying in 10s..."
            sleep 10
          done

      - name: Wait for frontend dev server
        run: |
          echo "Waiting for frontend at http://localhost:5173 ..."
          echo "(frontend container runs npm install before starting Vite — may take several minutes)"
          for i in $(seq 1 50); do
            if curl -sf http://localhost:5173 -o /dev/null; then
              echo "Frontend dev server is up."
              break
            fi
            if [ "$i" -eq 50 ]; then
              echo "ERROR: Frontend did not become available within 500s."
              docker compose logs frontend
              exit 1
            fi
            echo "  attempt $i/50 — retrying in 10s..."
            sleep 10
          done

      - name: Run database migrations
        run: docker compose exec -T api alembic upgrade head

      - name: Seed Natural Earth data
        run: docker compose exec -T api python -m app.db.seed.natural_earth_loader

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          # The Docker Compose frontend container creates ./frontend/node_modules
          # as root (anonymous volume initialisation on Linux bind mounts).
          # Remove it so npm ci can write as the runner user.  The container's
          # own node_modules lives in the anonymous Docker volume and is unaffected.
          sudo rm -rf frontend/node_modules
          cd frontend && npm ci

      - name: Install Playwright Chromium and system dependencies
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: cd frontend && npx playwright test

      - name: Dump Docker Compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint
        run: |
          cd backend
          ruff check .
          mypy app/

  # Preventive compliance control — catches the class of violations documented
  # in CF-001 before they accumulate into milestone-level findings. This job
  # complements but does not replace the milestone-exit compliance review
  # recorded in docs/compliance/scan-registry.md. Automated checks cover only
  # machine-detectable violations; semantic and architectural compliance still
  # requires human review at milestone boundaries.
  compliance-scan:
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install ruff

      - name: Check for bare except clauses (E722)
        run: |
          cd backend
          ruff check --select E722 .

      - name: Check for ambiguous variable names (E741)
        run: |
          cd backend
          ruff check --select E741 .

      - name: Check for legacy typing imports
        run: |
          # Dict, List, Optional, Tuple, Set from typing should use Python 3.10+
          # built-in generics: dict, list, T | None, tuple, set
          if grep -rn "from typing import.*\(Dict\|List\|Optional\|Tuple\|Set\)" backend/app/; then
            echo ""
            echo "ERROR: Legacy typing imports found in backend/app/."
            echo "Use Python 3.10+ built-in generics instead:"
            echo "  Dict[K, V]  → dict[K, V]"
            echo "  List[T]     → list[T]"
            echo "  Optional[T] → T | None"
            echo "  Tuple[...]  → tuple[...]"
            echo "  Set[T]      → set[T]"
            exit 1
          fi
          echo "No legacy typing imports found."

      - name: Warn on monetary float literals (COMPLIANCE-WARN)
        run: |
          # Scans backend/app/simulation/ for float literals adjacent to monetary
          # terminology. Emits COMPLIANCE-WARN lines but does not fail the build —
          # determining whether a float is performing monetary arithmetic (violation)
          # or is a dimensionless ratio or propagation weight (correct) requires
          # human judgment. Review COMPLIANCE-WARN output before merging.
          cd backend
          python scripts/compliance_scan.py --scope simulation-engine 2>&1 | \
            grep "COMPLIANCE-WARN" || echo "No monetary float warnings found."
          exit 0
