name: CI Failure Notify

on:
  workflow_run:
    workflows: ["WorldSim CI"]
    types: [completed]

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      # ── Collect common failure metadata ───────────────────────────────────────
      - name: Gather failure metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          # PR number (populated for same-repo PR runs; empty for direct pushes)
          PR_NUMBER=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}" \
            --jq '.pull_requests[0].number // empty')
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          # First failed job: name and ID
          FIRST_JOB=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure")] | .[0]')
          FIRST_JOB_NAME=$(echo "$FIRST_JOB" | jq -r '.name // "unknown job"')
          FIRST_JOB_ID=$(echo "$FIRST_JOB" | jq -r '.id // empty')
          echo "first_job_name=${FIRST_JOB_NAME}" >> "$GITHUB_OUTPUT"
          echo "first_job_id=${FIRST_JOB_ID}" >> "$GITHUB_OUTPUT"

          # All failed job names as a markdown list
          FAILED_JOBS_LIST=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | "- \(.name)"] | join("\n")')
          {
            echo "failed_jobs_list<<__FAILED_EOF__"
            echo "${FAILED_JOBS_LIST:-"- (none detected)"}"
            echo "__FAILED_EOF__"
          } >> "$GITHUB_OUTPUT"

          # Short and full commit SHA
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"

      # ── Extract first recognisable error line from job log ────────────────────
      - name: Extract first error line
        id: error
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          JOB_ID: ${{ steps.meta.outputs.first_job_id }}
        run: |
          ERROR_LINE=""
          if [ -n "${JOB_ID}" ] && [ "${JOB_ID}" != "null" ]; then
            ERROR_LINE=$(gh api "repos/${REPO}/actions/jobs/${JOB_ID}/logs" \
              2>/dev/null \
              | grep -vE '^\s*##\[' \
              | grep -iE '\berror\b|\bfailed\b|\bException\b' \
              | head -1 \
              || true)
          fi
          echo "line=${ERROR_LINE}" >> "$GITHUB_OUTPUT"

      # ── PR run: post a comment on the PR (existing behaviour) ─────────────────
      - name: Post failure comment to associated PR
        if: ${{ steps.meta.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          FAILED_JOBS_LIST: ${{ steps.meta.outputs.failed_jobs_list }}
          ERROR_LINE: ${{ steps.error.outputs.line }}
        run: |
          BODY="## CI Failed

**Workflow run:** ${RUN_URL}

**Failed jobs:**
${FAILED_JOBS_LIST}"

          if [ -n "${ERROR_LINE}" ]; then
            BODY="${BODY}

**First error line:**
\`\`\`
${ERROR_LINE}
\`\`\`"
          fi

          BODY="${BODY}

**Suggested Claude Code prompt:**
\`\`\`
CI failed on PR #${PR_NUMBER}. Investigate and fix: gh run view ${RUN_ID} --repo PublicEnemage/worldsim --log-failed
\`\`\`"

          gh issue comment "${PR_NUMBER}" --repo "${REPO}" --body "${BODY}"

      # ── Direct push run: open a tracked GitHub Issue ─────────────────────────
      # Fires when CI fails on a push directly to main (no PR exists).
      # Creates a compliance:major issue assigned to M7 so the failure
      # becomes a tracked work item rather than a silent gap in the audit trail.
      - name: Create tracked issue for direct-push CI failure
        if: ${{ steps.meta.outputs.pr_number == '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
          FIRST_JOB_NAME: ${{ steps.meta.outputs.first_job_name }}
          FIRST_JOB_ID: ${{ steps.meta.outputs.first_job_id }}
          FAILED_JOBS_LIST: ${{ steps.meta.outputs.failed_jobs_list }}
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
          ERROR_LINE: ${{ steps.error.outputs.line }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Direct job URL (deep-links to the first failed job if ID is available)
          JOB_URL="${RUN_URL}"
          if [ -n "${FIRST_JOB_ID}" ] && [ "${FIRST_JOB_ID}" != "null" ]; then
            JOB_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}/jobs/${FIRST_JOB_ID}"
          fi

          TITLE="CI failure on main — ${FIRST_JOB_NAME} — ${SHORT_SHA}"

          BODY="## CI failure on direct push to \`${BRANCH}\`

**Commit:** [\`${SHORT_SHA}\`](https://github.com/${REPO}/commit/${HEAD_SHA})
**Workflow run:** ${RUN_URL}

**Failed jobs:**
${FAILED_JOBS_LIST}

**First failing job:** ${JOB_URL}"

          if [ -n "${ERROR_LINE}" ]; then
            BODY="${BODY}

**First error line:**
\`\`\`
${ERROR_LINE}
\`\`\`"
          fi

          BODY="${BODY}

## Required actions

- [ ] Root cause identified and documented in a comment on this issue
- [ ] Fix committed and CI green on \`main\`
- [ ] Close this issue before running the next milestone exit checklist

## Suggested fix prompt

\`\`\`
CI failed on main at ${SHORT_SHA}. Investigate: gh run view ${RUN_ID} --repo PublicEnemage/worldsim --log-failed
\`\`\`

---
*Created automatically by \`ci-failure-notify.yml\` — direct push CI failure gate.*"

          gh issue create \
            --repo "${REPO}" \
            --title "${TITLE}" \
            --body "${BODY}" \
            --label "compliance:major" \
            --label "bug" \
            --milestone 8
