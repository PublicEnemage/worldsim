# WorldSim API Contracts Registry
#
# Authoritative documentation for every HTTP endpoint exposed by the FastAPI backend.
# Base URL: http://localhost:8000/api/v1  (configurable via API_BASE in frontend)
# All timestamps: ISO 8601 UTC. All numeric values: Decimal serialised as string.
# Schema version corresponds to docs/schema/database.yml schema_version.
#
# Any agent adding or modifying an endpoint MUST update this file.

---
schema_version: "1.0"
captured: "2026-04-26"
base_path: "/api/v1"

endpoints:

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  - method: GET
    path: /health
    summary: Liveness probe
    auth: none
    query_params: []
    response:
      status: 200
      body:
        status: {type: string, example: "ok"}
        version: {type: string, example: "0.3.0"}

  # ---------------------------------------------------------------------------
  # Countries
  # ---------------------------------------------------------------------------
  - method: GET
    path: /countries
    summary: List all country entities with display metadata and Level-1 attributes
    auth: none
    query_params: []
    response:
      status: 200
      body:
        type: array
        items:
          entity_id: {type: string, example: "GRC"}
          iso_a2: {type: string, example: "GR"}
          iso_a3: {type: string, example: "GRC"}
          name_en: {type: string, example: "Greece"}
          continent: {type: string}
          subregion: {type: string}
          un_region: {type: string}
          attributes:
            type: object
            description: >
              dict[attribute_key, QuantitySchema]. See database.yml quantity envelope.
    db_reads: [simulation_entities]

  - method: GET
    path: "/countries/{entity_id}"
    summary: Full detail for one country
    auth: none
    path_params:
      entity_id: {type: string, example: "GRC", description: "ISO 3166-1 alpha-3"}
    response:
      status: 200
      body:
        entity_id: {type: string}
        iso_a2: {type: string}
        iso_a3: {type: string}
        name_en: {type: string}
        continent: {type: string}
        subregion: {type: string}
        un_region: {type: string}
        attributes: {type: object, description: "dict[attribute_key, QuantitySchema]"}
        has_territorial_note: {type: boolean}
        territorial_note: {type: "string|null"}
      status_404: "Entity not found"
    db_reads: [simulation_entities, territorial_designations]

  - method: GET
    path: "/countries/{entity_id}/geometry"
    summary: GeoJSON geometry for one country
    auth: none
    path_params:
      entity_id: {type: string, example: "GRC"}
    response:
      status: 200
      body:
        type: {type: string, value: "Feature"}
        geometry: {type: object, description: "GeoJSON MultiPolygon"}
        properties:
          entity_id: {type: string}
          name_en: {type: string}
      status_404: "Entity not found or geometry null"
    db_reads: [simulation_entities]

  - method: GET
    path: "/countries/{entity_id}/attributes"
    summary: All Quantity attributes for one country
    auth: none
    path_params:
      entity_id: {type: string}
    response:
      status: 200
      body:
        type: object
        description: "dict[attribute_key, QuantitySchema]"
      status_404: "Entity not found"
    db_reads: [simulation_entities]

  - method: GET
    path: "/choropleth/{attribute_key}"
    summary: >
      GeoJSON FeatureCollection for choropleth rendering. Returns baseline values
      from simulation_entities when no scenario_id is given; snapshot values when
      scenario_id+step are given.
    auth: none
    path_params:
      attribute_key: {type: string, example: "population_total"}
    query_params:
      - name: scenario_id
        type: string
        required: false
        description: >
          When present, must be paired with step. Returns values from the
          snapshot at that step rather than the seeded baseline.
      - name: step
        type: integer
        required: false
        description: Step index to read from scenario_state_snapshots. Required if scenario_id given.
    response:
      status: 200
      body:
        type: {type: string, value: "FeatureCollection"}
        features:
          type: array
          items:
            type: {type: string, value: "Feature"}
            geometry: {type: object, description: "GeoJSON MultiPolygon"}
            properties:
              entity_id: {type: string}
              name: {type: string, description: "Display name from metadata.name_en"}
              attribute_value: {type: string, description: "Decimal as string"}
              confidence_tier: {type: integer}
              has_territorial_note: {type: boolean}
              territorial_note: {type: "string|null"}
      status_404: "attribute_key not found in any entity"
    db_reads: [simulation_entities, territorial_designations, scenario_state_snapshots]
    notes:
      - "attribute_value is always a string — use to-number in MapLibre paint expressions"

  - method: GET
    path: "/choropleth/{attribute_key}/delta"
    summary: GeoJSON FeatureCollection showing per-entity delta between two scenarios
    auth: none
    path_params:
      attribute_key: {type: string}
    query_params:
      - name: scenario_a
        type: string
        required: true
      - name: scenario_b
        type: string
        required: true
      - name: step
        type: integer
        required: false
        description: If omitted, uses latest snapshot for each scenario.
    response:
      status: 200
      body:
        type: {type: string, value: "FeatureCollection"}
        features:
          type: array
          items:
            properties:
              entity_id: {type: string}
              name: {type: string}
              attribute_value: {type: string, description: "str(delta) — Decimal as string"}
              value_a: {type: string}
              value_b: {type: string}
              delta_direction: {type: string, values: ["increase", "decrease", "unchanged"]}
              confidence_tier: {type: integer}
              has_territorial_note: {type: boolean}
              territorial_note: {type: "string|null"}
    db_reads: [scenario_state_snapshots, simulation_entities, territorial_designations]

  - method: GET
    path: /attributes/available
    summary: List all attribute keys present in the seeded entity set with unit and type
    auth: none
    query_params: []
    response:
      status: 200
      body:
        type: array
        items:
          attribute_key: {type: string}
          unit: {type: string}
          variable_type: {type: string}
    db_reads: [simulation_entities]

  # ---------------------------------------------------------------------------
  # Scenarios
  # ---------------------------------------------------------------------------
  - method: POST
    path: /scenarios
    summary: Create a new scenario in pending status
    auth: none
    request_body:
      name: {type: string, required: true, description: "Non-empty. Validated server-side."}
      description: {type: "string|null", required: false}
      configuration:
        entities: {type: "string[]", required: true, description: "entity_id values; validated to exist"}
        n_steps: {type: integer, required: true, range: [1, 100]}
        timestep_label: {type: string, required: true, example: "annual"}
        start_date: {type: "string|null", required: false, format: "ISO 8601 date", example: "2010-01-01", description: "Step-0 base date. Defaults to 2000-01-01 when absent."}
        initial_attributes: {type: object, required: false, default: {}}
        modules_config: {type: object, required: false, default: {}}
      scheduled_inputs:
        type: array
        required: false
        default: []
        items:
          step: {type: integer, description: "Must be in [0, n_steps-1]"}
          input_type: {type: string}
          input_data: {type: object}
    response:
      status: 201
      body:
        scenario_id: {type: string, description: "UUID4 as text"}
        name: {type: string}
        description: {type: "string|null"}
        status: {type: string, value: "pending"}
        version: {type: integer, value: 1}
        created_at: {type: string, format: "ISO 8601"}
      status_422: "Validation error — empty name, n_steps out of range, invalid step indices, unknown entity_ids"
    db_writes: [scenarios, scenario_scheduled_inputs]

  - method: GET
    path: /scenarios
    summary: List all scenarios ordered by created_at descending
    auth: none
    query_params: []
    response:
      status: 200
      body:
        type: array
        items:
          scenario_id: {type: string}
          name: {type: string}
          description: {type: "string|null"}
          status: {type: string, values: ["pending", "running", "completed", "failed"]}
          version: {type: integer}
          created_at: {type: string}
    db_reads: [scenarios]

  - method: GET
    path: /scenarios/compare
    summary: >
      Attribute deltas between two scenarios. delta = value_b - value_a.
      Must appear before /scenarios/{scenario_id} in router registration (FastAPI path ordering).
    auth: none
    query_params:
      - name: scenario_a
        type: string
        required: true
      - name: scenario_b
        type: string
        required: true
      - name: attr
        type: string
        required: false
        description: Filter to a single attribute key.
      - name: step
        type: integer
        required: false
        description: >
          If provided, both scenarios must have a snapshot at this exact step.
          If omitted, uses the latest snapshot for each scenario.
    response:
      status: 200
      body:
        scenario_a_id: {type: string}
        scenario_b_id: {type: string}
        step_a: {type: integer}
        step_b: {type: integer}
        deltas:
          type: object
          description: "dict[entity_id, dict[attribute_key, DeltaRecord]]"
          delta_record:
            value_a: {type: string, description: "Decimal as string"}
            value_b: {type: string, description: "Decimal as string"}
            delta: {type: string, description: "Decimal as string; negative for decrease"}
            direction: {type: string, values: ["increase", "decrease", "unchanged"]}
            confidence_tier: {type: integer, description: "max() of both tiers"}
      status_404: "scenario_a or scenario_b not found; or step not found for a scenario"
      status_409: "step omitted and one or both scenarios have no snapshots yet"
    db_reads: [scenarios, scenario_state_snapshots]

  - method: GET
    path: "/scenarios/{scenario_id}"
    summary: Full scenario detail including configuration and scheduled inputs
    auth: none
    path_params:
      scenario_id: {type: string}
    response:
      status: 200
      body:
        scenario_id: {type: string}
        name: {type: string}
        description: {type: "string|null"}
        status: {type: string}
        version: {type: integer}
        created_at: {type: string}
        configuration:
          entities: {type: "string[]"}
          n_steps: {type: integer}
          timestep_label: {type: string}
          start_date: {type: "string|null"}
          initial_attributes: {type: object}
          modules_config: {type: object}
        scheduled_inputs:
          type: array
          items:
            step: {type: integer}
            input_type: {type: string}
            input_data: {type: object}
      status_404: "Scenario not found"
    db_reads: [scenarios, scenario_scheduled_inputs]

  - method: DELETE
    path: "/scenarios/{scenario_id}"
    summary: >
      Delete scenario and all cascaded rows. Writes tombstone atomically before DELETE.
      ADR-004 Decision 1 Amendment.
    auth: none
    path_params:
      scenario_id: {type: string}
    response:
      status: 204
      body: null
      status_404: "Scenario not found"
    db_writes: [scenario_deleted_tombstones]
    db_deletes: [scenarios]  # cascades to scenario_scheduled_inputs, scenario_state_snapshots

  - method: POST
    path: "/scenarios/{scenario_id}/run"
    summary: >
      Execute a pending scenario to completion in one call.
      Blocks until all steps are complete. For step-by-step control use /advance.
    auth: none
    path_params:
      scenario_id: {type: string}
    response:
      status: 200
      body:
        scenario_id: {type: string}
        steps_executed: {type: integer}
        final_status: {type: string, values: ["completed", "failed"]}
        duration_seconds: {type: number}
      status_404: "Scenario not found"
      status_409: "Scenario is not in pending status"
    db_reads: [scenarios, simulation_entities, mda_thresholds]
    db_writes: [scenario_state_snapshots, scenarios]

  - method: POST
    path: "/scenarios/{scenario_id}/advance"
    summary: >
      Advance a scenario by exactly one simulation step. Returns the step
      index executed and whether the scenario is now complete. ADR-004 Decision 4.
    auth: none
    path_params:
      scenario_id: {type: string}
    response:
      status: 200
      body:
        scenario_id: {type: string}
        step_executed: {type: integer, description: "1-based; first advance returns 1"}
        steps_remaining: {type: integer}
        final_status: {type: string, values: ["running", "completed"]}
        is_complete: {type: boolean}
      status_404: "Scenario not found"
      status_409: "Scenario is already completed"
    db_reads: [scenarios, scenario_state_snapshots, simulation_entities, mda_thresholds]
    db_writes: [scenario_state_snapshots, scenarios]
    notes:
      - "step_executed is 1-indexed — the first advance returns step_executed=1"
      - "snapshots are written for steps 0 (initial) through n_steps"

  - method: GET
    path: "/scenarios/{scenario_id}/snapshots"
    summary: List all snapshots for a scenario ordered by step ascending. Used by backtesting.
    auth: none
    path_params:
      scenario_id: {type: string}
    response:
      status: 200
      body:
        type: array
        items:
          scenario_id: {type: string}
          step: {type: integer}
          timestep: {type: string, format: "ISO 8601"}
          state_data:
            type: object
            description: >
              Full state_data JSONB. Top-level keys: entity_id strings +
              _envelope_version + _modules_active. See database.yml state_data.
          modules_active: {type: "string[]"}
      status_404: "Scenario not found"
    db_reads: [scenarios, scenario_state_snapshots]

  - method: GET
    path: "/scenarios/{scenario_id}/trajectory"
    summary: >
      Multi-step trajectory for all four measurement frameworks. Returns computed
      steps only (dense array — ADR-010 Decision 2, FA-R3). null composite_score
      on a returned step means governance-in-validation OR no normalizable indicators
      at that step for single-entity scenarios (see scoring_basis). Schema updated
      2026-05-23 — EL Decisions A/B/C resolved; DA-F2/F4/F5 PENDINGs cleared.
      ci_lower/ci_upper remain pending ADR-007.
    auth: none
    path_params:
      scenario_id: {type: string}
    response:
      status: 200
      body:
        scenario_id: {type: string}
        entity_id: {type: string}
        step_count: {type: integer}
        mda_floors:
          type: array
          description: >
            Composite-score-level MDA floor lines for the trajectory view Y-axis.
            At the TrajectoryResponse root — NOT per-step (ADR-010 Decision 2).
            In M9: contains at most one entry (ecological WARNING at floor_value=1.0).
            All other framework floors deferred to M10 (EL Decision A, Issue #428).
            Empty array produces no ReferenceLine SVG elements — no render guard needed.
          items:
            framework: {type: string, values: ["financial", "human_development", "ecological", "governance"]}
            floor_value: {type: string, description: "Decimal as string. Composite-score-level — not indicator-level projection (CM-R3, ADR-010 Decision 6)."}
            severity: {type: string, values: ["WARNING", "CRITICAL", "TERMINAL"]}
            label: {type: string, description: "e.g. 'Planetary boundary'"}
        steps:
          type: array
          description: >
            Computed steps only — dense array (ADR-010 Decision 2). Absent steps
            were not yet computed at response time.
          items:
            step_index: {type: integer}
            effective_from:
              type: string
              format: "ISO 8601"
              description: "From scenario_state_snapshots.timestep at this step"
            step_event_label:
              type: "string|null"
              description: >
                Event label for SIGNIFICANT steps in Mode 1. Must be ≤ 8 words AND
                ≤ 32 characters (FA brief §Mode 1 Step Axis Annotation, DD-014).
                null when step_significance is ROUTINE. Sourced from
                scenarios.configuration.step_metadata[step_index] (EL Decision C,
                ADR-010 Decision 2 amendment 2026-05-23).
            step_significance:
              type: string
              values: ["SIGNIFICANT", "ROUTINE"]
              description: >
                Per ADR-010 Decision 7. "STANDARD" is incorrect — rejected by
                fixture validation. Sourced from scenarios.configuration.step_metadata.
                Absent key in step_metadata = ROUTINE.
            frameworks:
              type: array
              description: "Per-framework curve point for this step. One entry per active framework."
              items:
                framework:
                  type: string
                  values: ["financial", "human_development", "ecological", "governance"]
                composite_score:
                  type: "string|null"
                  description: >
                    Decimal as string. Three distinct null sources — use scoring_basis
                    to disambiguate:
                    (1) absent step = uncomputed (step absent from response, not null);
                    (2) governance null = in-validation (scoring_basis: "percentile_rank");
                    (3) single-entity financial/HD null = no normalizable indicators at
                        this step (scoring_basis: "normalized_absolute").
                scoring_basis:
                  type: string
                  values: ["percentile_rank", "normalized_absolute", "boundary_proximity"]
                  description: >
                    "percentile_rank" — cross-entity composite; financial and human_development
                    in multi-entity scenarios; governance (null composite_score when in-validation).
                    "normalized_absolute" — entity-intrinsic against declared reference ranges;
                    financial and human_development in single-entity scenarios (Path A). Tier 3
                    confidence floor. Reference ranges:
                    docs/architecture/cm-reference-range-consultation-2026-05-23.md §7a.
                    "boundary_proximity" — ecological only; distance from planetary boundary;
                    entity-intrinsic by definition. Scale [0.0, 2.0] (1.0 = at boundary).
                confidence_tier:
                  type: integer
                  range: [1, 5]
                  description: >
                    Minimum Tier 3 when scoring_basis is "normalized_absolute" (single-entity
                    normalized scores carry acknowledged range uncertainty).
                ci_lower:
                  type: "string|null"
                  description: "PENDING ADR-007 — BandingEngine not yet implemented. null until ADR-007 accepted."
                ci_upper:
                  type: "string|null"
                  description: "PENDING ADR-007 — same as ci_lower."
                ci_coverage:
                  type: "number|null"
                  description: "PENDING ADR-007 — 0.80 when present."
                is_pre_calibration:
                  type: "boolean|null"
                  description: "PENDING ADR-007."
            policy_inputs:
              type: array
              description: "Policy input events applied at this step. Source: scenario_scheduled_inputs."
              items:
                input_type: {type: string}
                input_data: {type: object}
            shock_events:
              type: array
              description: "Exogenous shock events at this step."
              items:
                event_type: {type: string}
                metadata: {type: object}
      status_404: "Scenario not found"
    db_reads:
      - scenarios
      - scenario_state_snapshots
      # mda_composite_floors: M10 only — table does not exist in M9.
      # In M9, mda_floors is constructed in application code:
      # ecological WARNING entry (floor_value=1.0) added when ecological is active;
      # all other framework floors return empty until mda_composite_floors is created (M10-B).
    notes:
      - "Schema updated 2026-05-23 — EL Decisions A/B/C resolved. All DA-F2/F4/F5 PENDINGs cleared."
      - "DA-F2 resolved: mda_floors at response root (not per-step); M9 returns [] except ecological WARNING at 1.0."
      - "DA-F3 remains: ci_lower/ci_upper pending ADR-007."
      - "DA-F4 resolved: scoring_basis field added; Path A selected (normalized_absolute for single-entity financial/HD)."
      - "DA-F5 resolved: step_event_label/step_significance sourced from scenarios.configuration.step_metadata JSONB."
      - "step_significance values are SIGNIFICANT or ROUTINE only — STANDARD is incorrect (ADR-010 Decision 7)."
      - "CM reference range consultation: docs/architecture/cm-reference-range-consultation-2026-05-23.md"

  - method: GET
    path: "/scenarios/{scenario_id}/measurement-output"
    summary: >
      Multi-framework measurement output for one entity at one step.
      ADR-005 Decision 2, Amendment 3. Groups entity attributes by measurement_framework tag.
      Untagged attributes default to "financial". ECOLOGICAL uses boundary proximity
      normalization [0.0, 2.0] (Decision M8-3). GOVERNANCE returns null (deferred M9,
      Decision M8-4).
    auth: none
    path_params:
      scenario_id: {type: string}
    query_params:
      - name: entity_id
        type: string
        required: true
        description: "ISO 3166-1 alpha-3 or cohort entity_id"
      - name: step
        type: integer
        required: true
        description: "Snapshot step index; must have a snapshot at this step"
    response:
      status: 200
      body:
        entity_id: {type: string}
        entity_name:
          type: string
          description: >
            Display name from simulation_entities.metadata->>'name_en'.
            Falls back to entity_id if metadata absent or name_en key missing.
        timestep: {type: string, format: "ISO 8601"}
        scenario_id: {type: string}
        step_index: {type: integer}
        outputs:
          type: object
          description: "dict[framework, FrameworkOutput]. Always has keys: financial, human_development, ecological, governance."
          framework_output:
            framework: {type: string}
            composite_score:
              type: "string|null"
              description: >
                Decimal as string. Framework-dependent: [0.0, 1.0] percentile rank for
                financial and human_development; [0.0, 2.0] boundary proximity for ecological
                (1.0 = at boundary, cap 2.0 for display). null for governance (deferred M9)
                and for financial/human_development in single-entity scenarios.
            indicators:
              type: object
              description: "dict[attribute_key, QuantitySchema] — attributes tagged to this framework"
            mda_alerts:
              type: array
              description: "MDA threshold breaches for this entity+framework at this step"
              items:
                mda_id: {type: string}
                entity_id: {type: string}
                indicator_key: {type: string}
                severity: {type: string, values: ["WARNING", "CRITICAL", "TERMINAL"]}
                floor_value: {type: string, description: "Decimal as string"}
                current_value: {type: string, description: "Decimal as string"}
                approach_pct_remaining: {type: string, description: "Negative when breached"}
                consecutive_breach_steps: {type: integer}
            has_below_floor_indicator: {type: boolean}
            note: {type: "string|null", description: "Non-null for unimplemented frameworks"}
        ia1_disclosure:
          type: string
          description: >
            IA-1 canonical disclosure phrase. Always non-empty.
            Must not be null, empty, or truncated — validated on write.
        single_entity_warning:
          type: boolean
          default: false
          description: >
            True when the snapshot contains exactly one entity. composite_score is
            null for financial and human_development (percentile rank is meaningless
            with a population of one). Ecological is exempt — boundary proximity is
            physically meaningful for a single entity (ADR-005 Amendment 3 Decision M8-2).
            Issue #193.
      status_404: "Scenario not found; or no snapshot at step; or entity not in snapshot"
    db_reads: [scenarios, scenario_state_snapshots, simulation_entities, mda_thresholds, simulation_reference_constants]
    notes:
      - "composite_score dispatch: ecological uses boundary proximity normalization (min(v/b,2.0) or min(v,2.0), capped at 2.0); financial and human_development use mean percentile rank. ADR-005 Amendment 3 Decision M8-3."
      - "ecological composite_score range [0.0, 2.0]: 1.0 = at boundary; >1.0 = boundary exceeded; 2.0 = display cap only"
      - "governance returns composite_score=null — GovernanceModule deferred to M9 (ADR-005 Amendment 3 Decision M8-4)"
      - "ecological is exempt from single_entity_warning suppression — boundary proximity meaningful for single entity (Decision M8-2)"
      - "financial framework includes all untagged attributes (backward-compat rule)"
      - "composite_score is null when single_entity_warning=true for financial and human_development — percentile rank requires ≥2 entities"
      - "db_reads includes simulation_reference_constants for ecological effective-at-simulation-time boundary constant query"
