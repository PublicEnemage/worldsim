# WorldSim API Contracts Registry
#
# Authoritative documentation for every HTTP endpoint exposed by the FastAPI backend.
# Base URL: http://localhost:8000/api/v1  (configurable via API_BASE in frontend)
# All timestamps: ISO 8601 UTC. All numeric values: Decimal serialised as string.
# Schema version corresponds to docs/schema/database.yml schema_version.
#
# Any agent adding or modifying an endpoint MUST update this file.

---
schema_version: "1.0"
captured: "2026-04-26"
base_path: "/api/v1"

endpoints:

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  - method: GET
    path: /health
    summary: Liveness probe
    auth: none
    query_params: []
    response:
      status: 200
      body:
        status: {type: string, example: "ok"}
        version: {type: string, example: "0.3.0"}

  # ---------------------------------------------------------------------------
  # Countries
  # ---------------------------------------------------------------------------
  - method: GET
    path: /countries
    summary: List all country entities with display metadata and Level-1 attributes
    auth: none
    query_params: []
    response:
      status: 200
      body:
        type: array
        items:
          entity_id: {type: string, example: "GRC"}
          iso_a2: {type: string, example: "GR"}
          iso_a3: {type: string, example: "GRC"}
          name_en: {type: string, example: "Greece"}
          continent: {type: string}
          subregion: {type: string}
          un_region: {type: string}
          attributes:
            type: object
            description: >
              dict[attribute_key, QuantitySchema]. See database.yml quantity envelope.
    db_reads: [simulation_entities]

  - method: GET
    path: "/countries/{entity_id}"
    summary: Full detail for one country
    auth: none
    path_params:
      entity_id: {type: string, example: "GRC", description: "ISO 3166-1 alpha-3"}
    response:
      status: 200
      body:
        entity_id: {type: string}
        iso_a2: {type: string}
        iso_a3: {type: string}
        name_en: {type: string}
        continent: {type: string}
        subregion: {type: string}
        un_region: {type: string}
        attributes: {type: object, description: "dict[attribute_key, QuantitySchema]"}
        has_territorial_note: {type: boolean}
        territorial_note: {type: "string|null"}
      status_404: "Entity not found"
    db_reads: [simulation_entities, territorial_designations]

  - method: GET
    path: "/countries/{entity_id}/geometry"
    summary: GeoJSON geometry for one country
    auth: none
    path_params:
      entity_id: {type: string, example: "GRC"}
    response:
      status: 200
      body:
        type: {type: string, value: "Feature"}
        geometry: {type: object, description: "GeoJSON MultiPolygon"}
        properties:
          entity_id: {type: string}
          name_en: {type: string}
      status_404: "Entity not found or geometry null"
    db_reads: [simulation_entities]

  - method: GET
    path: "/countries/{entity_id}/attributes"
    summary: All Quantity attributes for one country
    auth: none
    path_params:
      entity_id: {type: string}
    response:
      status: 200
      body:
        type: object
        description: "dict[attribute_key, QuantitySchema]"
      status_404: "Entity not found"
    db_reads: [simulation_entities]

  - method: GET
    path: "/choropleth/{attribute_key}"
    summary: >
      GeoJSON FeatureCollection for choropleth rendering. Returns baseline values
      from simulation_entities when no scenario_id is given; snapshot values when
      scenario_id+step are given.
    auth: none
    path_params:
      attribute_key: {type: string, example: "population_total"}
    query_params:
      - name: scenario_id
        type: string
        required: false
        description: >
          When present, must be paired with step. Returns values from the
          snapshot at that step rather than the seeded baseline.
      - name: step
        type: integer
        required: false
        description: Step index to read from scenario_state_snapshots. Required if scenario_id given.
    response:
      status: 200
      body:
        type: {type: string, value: "FeatureCollection"}
        features:
          type: array
          items:
            type: {type: string, value: "Feature"}
            geometry: {type: object, description: "GeoJSON MultiPolygon"}
            properties:
              entity_id: {type: string}
              name: {type: string, description: "Display name from metadata.name_en"}
              attribute_value: {type: string, description: "Decimal as string"}
              confidence_tier: {type: integer}
              has_territorial_note: {type: boolean}
              territorial_note: {type: "string|null"}
      status_404: "attribute_key not found in any entity"
    db_reads: [simulation_entities, territorial_designations, scenario_state_snapshots]
    notes:
      - "attribute_value is always a string — use to-number in MapLibre paint expressions"

  - method: GET
    path: "/choropleth/{attribute_key}/delta"
    summary: GeoJSON FeatureCollection showing per-entity delta between two scenarios
    auth: none
    path_params:
      attribute_key: {type: string}
    query_params:
      - name: scenario_a
        type: string
        required: true
      - name: scenario_b
        type: string
        required: true
      - name: step
        type: integer
        required: false
        description: If omitted, uses latest snapshot for each scenario.
    response:
      status: 200
      body:
        type: {type: string, value: "FeatureCollection"}
        features:
          type: array
          items:
            properties:
              entity_id: {type: string}
              name: {type: string}
              attribute_value: {type: string, description: "str(delta) — Decimal as string"}
              value_a: {type: string}
              value_b: {type: string}
              delta_direction: {type: string, values: ["increase", "decrease", "unchanged"]}
              confidence_tier: {type: integer}
              has_territorial_note: {type: boolean}
              territorial_note: {type: "string|null"}
    db_reads: [scenario_state_snapshots, simulation_entities, territorial_designations]

  - method: GET
    path: /attributes/available
    summary: List all attribute keys present in the seeded entity set with unit and type
    auth: none
    query_params: []
    response:
      status: 200
      body:
        type: array
        items:
          attribute_key: {type: string}
          unit: {type: string}
          variable_type: {type: string}
    db_reads: [simulation_entities]

  # ---------------------------------------------------------------------------
  # Scenarios
  # ---------------------------------------------------------------------------
  - method: POST
    path: /scenarios
    summary: "POST /scenarios — Create a new scenario in pending status"
    auth: none
    request_body:
      name: {type: string, required: true, description: "Non-empty. Validated server-side."}
      description: {type: "string|null", required: false}
      configuration:
        entities: {type: "string[]", required: true, description: "entity_id values; validated to exist"}
        n_steps: {type: integer, required: true, range: [1, 100]}
        projection_steps: {type: "integer|null", required: false, range: [1, 100], default: null, description: "Long-run projection horizon (M16-G3 #274). When set, overrides n_steps as total step count. projection_steps > 8 enables 25-year quarterly trajectory with DemographicModule auto-enabled and adaptive_resolution disabled."}
        ecological_shock_coefficient: {type: number, required: false, range: [0.0, 1.0], default: 0.0, description: "ADR-012 ecological-to-financial transmission coefficient (M16-G4 #275). 0.0 = no ecological transmission (default). 1.0 = full transmission. Values outside [0.0, 1.0] rejected with 422."}
        timestep_label: {type: string, required: true, example: "annual"}
        start_date: {type: "string|null", required: false, format: "ISO 8601 date", example: "2010-01-01", description: "Step-0 base date. Defaults to 2000-01-01 when absent."}
        initial_attributes: {type: object, required: false, default: {}}
        modules_config: {type: object, required: false, default: {}}
      scheduled_inputs:
        type: array
        required: false
        default: []
        items:
          step: {type: integer, description: "Must be in [0, n_steps-1]"}
          input_type: {type: string}
          input_data: {type: object}
    response:
      status: 201
      body:
        scenario_id: {type: string, description: "UUID4 as text"}
        name: {type: string}
        description: {type: "string|null"}
        status: {type: string, value: "pending"}
        version: {type: integer, value: 1}
        created_at: {type: string, format: "ISO 8601"}
      status_422: "Validation error — empty name, n_steps out of range, invalid step indices, unknown entity_ids"
    db_writes: [scenarios, scenario_scheduled_inputs]

  - method: GET
    path: /scenarios
    summary: List all scenarios ordered by created_at descending
    auth: none
    query_params: []
    response:
      status: 200
      body:
        type: array
        items:
          scenario_id: {type: string}
          name: {type: string}
          description: {type: "string|null"}
          status: {type: string, values: ["pending", "running", "completed", "failed"]}
          version: {type: integer}
          created_at: {type: string}
    db_reads: [scenarios]

  - method: GET
    path: /scenarios/compare
    summary: >
      Attribute deltas between two scenarios. delta = value_b - value_a.
      Must appear before /scenarios/{scenario_id} in router registration (FastAPI path ordering).
      All-attributes mode (Issue #90): when attr is omitted, ALL shared attributes across
      ALL shared entities are returned in a single call — multi-framework comparison
      without N serial API calls. Pass attr to filter to a single key.
    auth: none
    query_params:
      - name: scenario_a
        type: string
        required: true
      - name: scenario_b
        type: string
        required: true
      - name: attr
        type: string
        required: false
        description: >
          Filter to a single attribute key. When omitted, returns all shared
          attributes across all shared entities (Issue #90, ARCH-REVIEW-002 BI2-I-05).
      - name: step
        type: integer
        required: false
        description: >
          If provided, both scenarios must have a snapshot at this exact step.
          If omitted, uses the latest snapshot for each scenario.
      - name: threshold_value
        type: string
        required: false
        description: >
          Optional numeric string. When provided, each DeltaRecord includes
          threshold_crossed: bool (Issue #153).
    response:
      status: 200
      body:
        scenario_a_id: {type: string}
        scenario_b_id: {type: string}
        step_a: {type: integer}
        step_b: {type: integer}
        deltas:
          type: array
          description: "Flat list of FlatDeltaRecord — M16-G4 #102"
          items:
            entity_id: {type: string}
            attribute_key: {type: string}
            value_a: {type: string, description: "Decimal as string"}
            value_b: {type: string, description: "Decimal as string"}
            delta: {type: string, description: "Decimal as string; negative for decrease"}
            direction: {type: string, values: ["increase", "decrease", "unchanged"]}
            confidence_tier: {type: integer, description: "max() of both tiers"}
            threshold_crossed: {type: "bool|null", description: "null when threshold_value not supplied"}
            threshold_crossings:
              type: array
              description: >
                MDA threshold crossing entries for this indicator at the compared step — M16-G9 #97.
                Only entries where the threshold is violated (crossed=True) are included.
                Empty list [] when no MDA threshold applies to this indicator or none are crossed.
                Never null — always a list (empty or non-empty).
              items:
                threshold_name: {type: string, description: "mda_id of the crossed MDA threshold"}
                crossed: {type: boolean, description: "Always true — only violated thresholds are listed"}
            distribution:
              type: object
              description: "Distributional statistics across all shared steps. All fields null when <3 shared steps (M16-G4 #102)."
              variance: {type: "string|null", description: "Population variance of delta series (Decimal as string)"}
              p10: {type: "string|null", description: "10th percentile of delta series (Decimal as string)"}
              p50: {type: "string|null", description: "50th percentile of delta series (Decimal as string)"}
              p90: {type: "string|null", description: "90th percentile of delta series (Decimal as string)"}
      status_404: "scenario_a or scenario_b not found; or step not found for a scenario"
      status_409: "step omitted and one or both scenarios have no snapshots yet"
    db_reads: [scenarios, scenario_state_snapshots]

  - method: GET
    path: /scenarios/compare/trajectory
    summary: >
      Per-step attribute trajectory delta between two scenarios — Issue #99,
      ARCH-REVIEW-002 BI2-N-08. Returns a time series of value_a, value_b,
      and delta tuples for all steps where both scenarios have snapshots.
      Enables trajectory analysis and cumulative welfare computation (integral
      of delta over all steps) in a single API call.
      Must appear before /scenarios/{scenario_id} in router registration.
    auth: none
    query_params:
      - name: scenario_a
        type: string
        required: true
      - name: scenario_b
        type: string
        required: true
      - name: attribute
        type: string
        required: true
        description: Attribute key to compare across all shared steps.
    response:
      status: 200
      body:
        scenario_a_id: {type: string}
        scenario_b_id: {type: string}
        attribute: {type: string}
        steps:
          type: array
          description: "Sorted ascending by step. One entry per shared step."
          items:
            step: {type: integer}
            value_a: {type: "string|null", description: "Decimal as string; null when attribute absent"}
            value_b: {type: "string|null", description: "Decimal as string; null when attribute absent"}
            delta: {type: "string|null", description: "Decimal as string; null when either value absent"}
            direction: {type: "string|null", values: ["increase", "decrease", "unchanged", null]}
      status_404: "scenario_a or scenario_b not found"
      status_409: "one or both scenarios have no snapshots yet"
    db_reads: [scenarios, scenario_state_snapshots]

  - method: POST
    path: /scenarios/comparison/distributional-differential
    summary: >
      M18-G3 (#1349) — Q1 poverty headcount differential across N≥2 scenarios.
      For each non-reference scenario, returns per-step Q1 poverty headcount
      differential vs. the reference scenario, with T3 CI bounds and a
      direction stability flag. Must appear before /scenarios/{scenario_id}
      in router registration.
    auth: none
    request_body:
      entity_id: {type: string, description: "ISO 3166-1 alpha-3 entity code"}
      scenario_ids: {type: "string[]", description: "N≥2 scenario IDs including reference"}
      reference_scenario_id: {type: string, description: "Must be in scenario_ids"}
    response:
      status: 200
      body:
        entity_id: {type: string}
        reference_scenario_id: {type: string}
        terminal_step: {type: integer}
        tier: {type: string, description: "T3 placeholder pending G1 banding_engine (ADR-007)"}
        methodology_summary: {type: string}
        pairs:
          type: array
          items:
            scenario_id: {type: string}
            steps:
              type: array
              items:
                step: {type: integer}
                headcount_differential: {type: integer, description: "Q1 persons: scenario − reference"}
                ci_lower: {type: integer, description: "Lower 95% CI bound (T3 placeholder)"}
                ci_upper: {type: integer, description: "Upper 95% CI bound (T3 placeholder)"}
                direction_stable: {type: boolean, description: "(ci_lower > 0) OR (ci_upper < 0)"}
      status_400: "fewer than 2 scenarios, or reference not in scenario_ids"
      status_404: "any scenario has no snapshots"
      status_409: "no shared steps across all scenarios"
    db_reads: [scenario_state_snapshots]
    notes:
      - "AC-1349-G: headcount_differential is integer; direction_stable = (ci_lower>0) OR (ci_upper<0)"
      - "AC-schema: fields headcount_differential, ci_lower, ci_upper, direction_stable, tier present"

  - method: GET
    path: "/scenarios/{scenario_id}"
    summary: Full scenario detail including configuration and scheduled inputs
    auth: none
    path_params:
      scenario_id: {type: string}
    response:
      status: 200
      body:
        scenario_id: {type: string}
        name: {type: string}
        description: {type: "string|null"}
        status: {type: string}
        version: {type: integer}
        created_at: {type: string}
        configuration:
          entities: {type: "string[]"}
          n_steps: {type: integer}
          timestep_label: {type: string}
          start_date: {type: "string|null"}
          initial_attributes: {type: object}
          fiscal_multiplier: {type: "number|null", description: "Mode 2 fiscal multiplier; 1.0 = default; null = not set"}
          modules_config:
            type: object
            description: >
              Optional module activation JSONB. DA-G5-3 confirmed paths:
              political_economy.enabled (boolean) — whether the political economy module is active;
              political_economy.conditionality_type (string: "standard"|"strict"|"relaxed") — conditionality type.
            political_economy:
              enabled: {type: "boolean|null", required: false}
              conditionality_type: {type: "string|null", values: ["standard", "strict", "relaxed"], required: false}
        scheduled_inputs:
          type: array
          items:
            step: {type: integer}
            input_type: {type: string}
            input_data: {type: object}
        temporal_scope_note: {type: string, description: "Generated from n_steps + timestep_label + start_date. States the modeled window and notes that intergenerational / long-horizon consequences are outside it. Issue #98 / ARCH-REVIEW-002 BI2-N-07."}
      status_404: "Scenario not found"
    db_reads: [scenarios, scenario_scheduled_inputs]

  - method: DELETE
    path: "/scenarios/{scenario_id}"
    summary: >
      Delete scenario and all cascaded rows. Writes tombstone atomically before DELETE.
      ADR-004 Decision 1 Amendment.
    auth: none
    path_params:
      scenario_id: {type: string}
    response:
      status: 204
      body: null
      status_404: "Scenario not found"
    db_writes: [scenario_deleted_tombstones]
    db_deletes: [scenarios]  # cascades to scenario_scheduled_inputs, scenario_state_snapshots

  - method: POST
    path: "/scenarios/{scenario_id}/run"
    summary: >
      Execute a pending scenario to completion in one call.
      Blocks until all steps are complete. For step-by-step control use /advance.
    auth: none
    path_params:
      scenario_id: {type: string}
    response:
      status: 200
      body:
        scenario_id: {type: string}
        steps_executed: {type: integer}
        final_status: {type: string, values: ["completed", "failed"]}
        duration_seconds: {type: number}
      status_404: "Scenario not found"
      status_409: "Scenario is not in pending status"
    db_reads: [scenarios, simulation_entities, mda_thresholds]
    db_writes: [scenario_state_snapshots, scenarios]

  - method: POST
    path: "/scenarios/{scenario_id}/advance"
    summary: >
      Advance a scenario by exactly one simulation step. Returns the step
      index executed and whether the scenario is now complete. ADR-004 Decision 4.
    auth: none
    path_params:
      scenario_id: {type: string}
    response:
      status: 200
      body:
        scenario_id: {type: string}
        step_executed: {type: integer, description: "1-based; first advance returns 1"}
        steps_remaining: {type: integer}
        final_status: {type: string, values: ["running", "completed"]}
        is_complete: {type: boolean}
        resolution_level: {type: integer, description: "Always 1 for current scenarios — nation-state Level 1 resolution. Issue #158 / ARCH-REVIEW-002 BI2-N-09."}
        resolution_disclaimer: {type: string, description: "Static disclaimer: subnational/community impacts not representable at Level 1 resolution. Issue #158."}
      status_404: "Scenario not found"
      status_409: "Scenario is already completed"
    db_reads: [scenarios, scenario_state_snapshots, simulation_entities, mda_thresholds]
    db_writes: [scenario_state_snapshots, scenarios]
    notes:
      - "step_executed is 1-indexed — the first advance returns step_executed=1"
      - "snapshots are written for steps 0 (initial) through n_steps"

  - method: GET
    path: "/scenarios/{scenario_id}/snapshots"
    summary: List all snapshots for a scenario ordered by step ascending. Used by backtesting.
    auth: none
    path_params:
      scenario_id: {type: string}
    response:
      status: 200
      body:
        type: array
        items:
          scenario_id: {type: string}
          step: {type: integer}
          timestep: {type: string, format: "ISO 8601"}
          state_data:
            type: object
            description: >
              Full state_data JSONB. Top-level keys: entity_id strings +
              _envelope_version + _modules_active. See database.yml state_data.
          modules_active: {type: "string[]"}
          resolution_disclaimer: {type: string, description: "Static Level 1 resolution disclaimer. Issue #100 / ARCH-REVIEW-002 BI2-N-09."}
      status_404: "Scenario not found"
    db_reads: [scenarios, scenario_state_snapshots]

  - method: GET
    path: "/scenarios/{scenario_id}/trajectory"
    summary: >
      Multi-step trajectory for all four measurement frameworks. Returns computed
      steps only (dense array — ADR-010 Decision 2, FA-R3). null composite_score
      on a returned step means governance-in-validation OR no normalizable indicators
      at that step for single-entity scenarios (see scoring_basis). Schema updated
      2026-05-23 — EL Decisions A/B/C resolved; DA-F2/F4/F5 PENDINGs cleared.
      ci_lower/ci_upper remain pending ADR-007.
    auth: none
    path_params:
      scenario_id: {type: string}
    response:
      status: 200
      body:
        scenario_id: {type: string}
        entity_id: {type: string}
        step_count: {type: integer}
        mda_floors:
          type: array
          description: >
            Composite-score-level MDA floor lines for the trajectory view Y-axis.
            At the TrajectoryResponse root — NOT per-step (ADR-010 Decision 2).
            In M9: contains at most one entry (ecological WARNING at floor_value=1.0).
            All other framework floors deferred to M10 (EL Decision A, Issue #428).
            Empty array produces no ReferenceLine SVG elements — no render guard needed.
          items:
            framework: {type: string, values: ["financial", "human_development", "ecological", "governance"]}
            floor_value: {type: string, description: "Decimal as string. Composite-score-level — not indicator-level projection (CM-R3, ADR-010 Decision 6)."}
            severity: {type: string, values: ["WARNING", "CRITICAL", "TERMINAL"]}
            label: {type: string, description: "e.g. 'Planetary boundary'"}
        steps:
          type: array
          description: >
            Computed steps only — dense array (ADR-010 Decision 2). Absent steps
            were not yet computed at response time.
          items:
            step_index: {type: integer}
            effective_from:
              type: string
              format: "ISO 8601"
              description: "From scenario_state_snapshots.timestep at this step"
            step_event_label:
              type: "string|null"
              description: >
                Event label for SIGNIFICANT steps in Mode 1. Must be ≤ 8 words AND
                ≤ 32 characters (FA brief §Mode 1 Step Axis Annotation, DD-014).
                null when step_significance is ROUTINE. Sourced from
                scenarios.configuration.step_metadata[step_index] (EL Decision C,
                ADR-010 Decision 2 amendment 2026-05-23).
            step_significance:
              type: string
              values: ["SIGNIFICANT", "ROUTINE"]
              description: >
                Per ADR-010 Decision 7. "STANDARD" is incorrect — rejected by
                fixture validation. Sourced from scenarios.configuration.step_metadata.
                Absent key in step_metadata = ROUTINE.
            frameworks:
              type: array
              description: "Per-framework curve point for this step. One entry per active framework."
              items:
                framework:
                  type: string
                  values: ["financial", "human_development", "ecological", "governance"]
                composite_score:
                  type: "string|null"
                  description: >
                    Decimal as string. Three distinct null sources — use scoring_basis
                    to disambiguate:
                    (1) absent step = uncomputed (step absent from response, not null);
                    (2) governance null = in-validation (scoring_basis: "percentile_rank");
                    (3) single-entity financial/HD null = no normalizable indicators at
                        this step (scoring_basis: "normalized_absolute").
                scoring_basis:
                  type: string
                  values: ["percentile_rank", "normalized_absolute", "boundary_proximity"]
                  description: >
                    "percentile_rank" — cross-entity composite; financial and human_development
                    in multi-entity scenarios; governance (null composite_score when in-validation).
                    "normalized_absolute" — entity-intrinsic against declared reference ranges;
                    financial and human_development in single-entity scenarios (Path A). Tier 3
                    confidence floor. Reference ranges:
                    docs/architecture/cm-reference-range-consultation-2026-05-23.md §7a.
                    "boundary_proximity" — ecological only; distance from planetary boundary;
                    entity-intrinsic by definition. Scale [0.0, 2.0] (1.0 = at boundary).
                confidence_tier:
                  type: integer
                  range: [1, 5]
                  description: >
                    Minimum Tier 3 when scoring_basis is "normalized_absolute" (single-entity
                    normalized scores carry acknowledged range uncertainty).
                ci_lower:
                  type: "string|null"
                  description: "PENDING ADR-007 — BandingEngine not yet implemented. null until ADR-007 accepted."
                ci_upper:
                  type: "string|null"
                  description: "PENDING ADR-007 — same as ci_lower."
                ci_coverage:
                  type: "number|null"
                  description: "PENDING ADR-007 — 0.80 when present."
                is_pre_calibration:
                  type: "boolean|null"
                  description: "PENDING ADR-007."
            policy_inputs:
              type: array
              description: "Policy input events applied at this step. Source: scenario_scheduled_inputs."
              items:
                input_type: {type: string}
                input_data: {type: object}
            shock_events:
              type: array
              description: "Exogenous shock events at this step."
              items:
                event_type: {type: string}
                metadata: {type: object}
      status_404: "Scenario not found"
    db_reads:
      - scenarios
      - scenario_state_snapshots
      # mda_composite_floors: M10 only — table does not exist in M9.
      # In M9, mda_floors is constructed in application code:
      # ecological WARNING entry (floor_value=1.0) added when ecological is active;
      # all other framework floors return empty until mda_composite_floors is created (M10-B).
    notes:
      - "Schema updated 2026-05-23 — EL Decisions A/B/C resolved. All DA-F2/F4/F5 PENDINGs cleared."
      - "DA-F2 resolved: mda_floors at response root (not per-step); M9 returns [] except ecological WARNING at 1.0."
      - "DA-F3 remains: ci_lower/ci_upper pending ADR-007."
      - "DA-F4 resolved: scoring_basis field added; Path A selected (normalized_absolute for single-entity financial/HD)."
      - "DA-F5 resolved: step_event_label/step_significance sourced from scenarios.configuration.step_metadata JSONB."
      - "step_significance values are SIGNIFICANT or ROUTINE only — STANDARD is incorrect (ADR-010 Decision 7)."
      - "CM reference range consultation: docs/architecture/cm-reference-range-consultation-2026-05-23.md"

  - method: GET
    path: "/scenarios/{scenario_id}/measurement-output"
    summary: >
      Multi-framework measurement output for one entity at one step.
      ADR-005 Decision 2, Amendment 3. Groups entity attributes by measurement_framework tag.
      Untagged attributes default to "financial". ECOLOGICAL uses boundary proximity
      normalization [0.0, 2.0] (Decision M8-3). GOVERNANCE returns null (deferred M9,
      Decision M8-4).
    auth: none
    path_params:
      scenario_id: {type: string}
    query_params:
      - name: entity_id
        type: string
        required: true
        description: "ISO 3166-1 alpha-3 or cohort entity_id"
      - name: step
        type: integer
        required: true
        description: "Snapshot step index; must have a snapshot at this step"
    response:
      status: 200
      body:
        entity_id: {type: string}
        entity_name:
          type: string
          description: >
            Display name from simulation_entities.metadata->>'name_en'.
            Falls back to entity_id if metadata absent or name_en key missing.
        timestep: {type: string, format: "ISO 8601"}
        scenario_id: {type: string}
        step_index: {type: integer}
        outputs:
          type: object
          description: "dict[framework, FrameworkOutput]. Always has keys: financial, human_development, ecological, governance."
          framework_output:
            framework: {type: string}
            composite_score:
              type: "string|null"
              description: >
                Decimal as string. Framework-dependent: [0.0, 1.0] percentile rank for
                financial and human_development; [0.0, 2.0] boundary proximity for ecological
                (1.0 = at boundary, cap 2.0 for display). null for governance (deferred M9)
                and for financial/human_development in single-entity scenarios.
            indicators:
              type: object
              description: "dict[attribute_key, QuantitySchema] — attributes tagged to this framework"
            mda_alerts:
              type: array
              description: "MDA threshold breaches for this entity+framework at this step"
              items:
                mda_id: {type: string}
                entity_id: {type: string}
                indicator_key: {type: string}
                severity: {type: string, values: ["WARNING", "CRITICAL", "TERMINAL"]}
                floor_value: {type: string, description: "Decimal as string"}
                current_value: {type: string, description: "Decimal as string"}
                approach_pct_remaining: {type: string, description: "Negative when breached"}
                consecutive_breach_steps: {type: integer}
            has_below_floor_indicator: {type: boolean}
            note: {type: "string|null", description: "Non-null for unimplemented frameworks"}
        ia1_disclosure:
          type: string
          description: >
            IA-1 canonical disclosure phrase. Always non-empty.
            Must not be null, empty, or truncated — validated on write.
        single_entity_warning:
          type: boolean
          default: false
          description: >
            True when the snapshot contains exactly one entity. composite_score is
            null for financial and human_development (percentile rank is meaningless
            with a population of one). Ecological is exempt — boundary proximity is
            physically meaningful for a single entity (ADR-005 Amendment 3 Decision M8-2).
            Issue #193.
      status_404: "Scenario not found; or no snapshot at step; or entity not in snapshot"
    db_reads: [scenarios, scenario_state_snapshots, simulation_entities, mda_thresholds, simulation_reference_constants]
    notes:
      - "composite_score dispatch: ecological uses boundary proximity normalization (min(v/b,2.0) or min(v,2.0), capped at 2.0); financial and human_development use mean percentile rank. ADR-005 Amendment 3 Decision M8-3."
      - "ecological composite_score range [0.0, 2.0]: 1.0 = at boundary; >1.0 = boundary exceeded; 2.0 = display cap only"
      - "governance returns composite_score=null — GovernanceModule deferred to M9 (ADR-005 Amendment 3 Decision M8-4)"
      - "ecological is exempt from single_entity_warning suppression — boundary proximity meaningful for single entity (Decision M8-2)"
      - "financial framework includes all untagged attributes (backward-compat rule)"
      - "composite_score is null when single_entity_warning=true for financial and human_development — percentile rank requires ≥2 entities"
      - "db_reads includes simulation_reference_constants for ecological effective-at-simulation-time boundary constant query"
      - "DA-G5-4 (ADR-015 Component 3): political_economy framework outputs.political_economy.indicators.programme_survival_probability is a QuantitySchema entry (value: Decimal string|null, confidence_tier: 3, unit: 'probability'). Distinct from political_economy.composite_score (3-factor composite from ADR-013). Frontend fetches this via Option A: measurement-output at current step."
      - "DA-G6-1 (G6 #824): ecological framework indicators include water_stress_index for entities with biome_class=arid_semiarid (JOR, ZMB). QuantitySchema entry with value: Decimal string, confidence_tier: 3, unit: 'ratio_0_2'. nullable_when: entity biome_class != arid_semiarid (attribute absent from snapshot state_data for non-arid entities). source_registry_id: ACADEMIC_LITERATURE_FAO_GFR_ARID_ICARDA_WATER_STRESS."
      - "DA-G6-2 (G6 #884): reserve_coverage_months in /initial-state response — indicator seeded as variable_type=stock in entity seed migration b1c2d3e4f5a6 for JOR (corrected from G3 ratio), EGY (new), ZMB (new). Appears in frameworks.financial.indicators when entity advanced ≥1 step. confidence_tier: 2 (JOR/EGY), 3 (ZMB synthetic)."

  # ---------------------------------------------------------------------------
  # Causal Graph (US-048 — X-Ray Interactive Graph)
  # ---------------------------------------------------------------------------
  - method: GET
    path: "/scenarios/{scenario_id}/causal-graph"
    summary: >
      Causal graph for a scenario at a given step. Returns nodes (indicators) and
      directed edges (propagation relationships with elasticity weights). Used by
      the Zone 2 X-ray interactive graph. Does not route through the simulation
      computation path — reads from the engine's propagation registry at the
      specified step. Authority: ARCH-REVIEW-006 AR-006-B-013/014, Issue #611.
    auth: none
    path_params:
      scenario_id: {type: string, format: uuid, description: "Scenario UUID"}
    query_params:
      - name: step
        type: integer
        required: true
        description: "Step index (0-based). Graph weights may vary by step if elasticities are dynamic."
    response:
      status: 200
      body:
        scenario_id: {type: string, format: uuid}
        step: {type: integer}
        nodes:
          type: array
          description: "One entry per indicator present in the causal graph at this step."
          items:
            indicator_key: {type: string, example: "gdp_growth_rate"}
            framework: {type: string, example: "financial", description: "Framework the indicator belongs to"}
            label_en: {type: string, description: "Human-readable indicator name"}
            current_value:
              type: "string|null"
              description: "Decimal as string. Indicator value at this step. null if not computed."
            confidence_tier:
              type: integer
              description: "Data confidence tier (1–5) for this indicator at this step."
        edges:
          type: array
          description: >
            Directed propagation edges. Each edge represents a modelled causal
            relationship between two indicators. Cross-framework edges (e.g.,
            fiscal → education → human capability) are included.
          items:
            source_indicator_key: {type: string}
            target_indicator_key: {type: string}
            weight:
              type: string
              description: "Elasticity estimate as Decimal string. Signed: positive = same-direction, negative = inverse."
            direction:
              type: string
              enum: [unidirectional, bidirectional]
              description: "Whether the relationship models a reverse effect from target back to source."
            edge_confidence_tier:
              type: integer
              description: >
                Confidence tier (1–5) of the elasticity estimate for this edge.
                Reflects literature source quality, not indicator data quality.
                Tier 1/2: high-quality meta-analysis or replicated empirical study.
                Tier 4/5: rough model estimate or expert prior with limited literature backing.
                Required field — must not be omitted. A missing tier implies equal certainty
                across all edges, which is a No False Precision violation
                (ARCH-REVIEW-006 AR-006-B-013).
            is_cross_framework:
              type: boolean
              description: >
                True when source and target belong to different frameworks (e.g.,
                fiscal pressure → education spending → human capability).
                Frontend must visually differentiate cross-framework edges with
                lower edge_confidence_tier using reduced weight or opacity
                (ARCH-REVIEW-006 AR-006-B-014).
      status_400: "step parameter missing or not a valid integer"
      status_404: "Scenario not found; or no causal graph registered for this scenario"
    db_reads: [scenarios, propagation_registry]
    notes:
      - "This endpoint does NOT route through the simulation computation path. It reads from the engine's propagation registry (static at scenario creation time, updated if elasticities are dynamic)."
      - "edge_confidence_tier is a required field. Omitting it is a schema violation."
      - "is_cross_framework=true edges must be visually differentiated in the frontend by edge_confidence_tier (weight, opacity, or dash style)."
      - "Zone 2 view model: Option A (Switchable Zone 2) — EL decision 2026-06-03, ARCH-REVIEW-006 AR-006-B-012."
      - "Authority: ARCH-REVIEW-006 AR-006-B-013/014; Issue #611."

  # ---------------------------------------------------------------------------
  # Observed Actuals Overlay (US-042 — Accountability Tracking)
  # ---------------------------------------------------------------------------
  - method: GET
    path: "/scenarios/{scenario_id}/actuals"
    summary: >
      Observed actuals series for a scenario entity. Returns external observations
      (IMF Article IV, HIPC tracker, government self-reports) as a distinct series
      for overlay on the Zone 1 trajectory view. Does NOT route through the simulation
      engine. Authority: ARCH-REVIEW-006 AR-006-B-004/005/006, AR-006-C-001, Issue #604.
    auth: none
    path_params:
      scenario_id: {type: string, format: uuid}
    query_params:
      - name: entity_id
        type: string
        required: true
        description: "ISO 3166-1 alpha-3 entity ID"
    response:
      status: 200
      body:
        scenario_id: {type: string, format: uuid}
        entity_id: {type: string}
        confound_annotation:
          type: string
          required: true
          description: >
            Non-null, non-empty confound disclosure. Canonical text:
            "Divergence between projected and observed outcomes may reflect factors
            unrelated to the policy scenario modelled, including external shocks,
            data revision, and implementation variance. Causal attribution to policy
            choices alone is not supported by this comparison."
            May not be null, empty, or absent — API layer enforcement
            (ARCH-REVIEW-006 AR-006-B-005; EL decision Option B 2026-06-03).
        series:
          type: array
          description: "One entry per indicator with registered actuals data."
          items:
            indicator_key: {type: string}
            framework: {type: string}
            observations:
              type: array
              description: >
                Sparse observations. Not every step is guaranteed to have an entry.
                Gaps must be rendered as broken lines — no interpolation.
              items:
                step_year: {type: integer, description: "Calendar year of the observation"}
                value: {type: string, description: "Decimal as string"}
                unit: {type: string}
                confidence_tier: {type: integer}
                source_name: {type: string, description: "Human-readable source name for tooltip"}
                vintage_date: {type: string, format: date, description: "Date observation was published/retrieved"}
      status_404: "Scenario not found; or no actuals registered for this entity"
    db_reads: [scenarios, observed_actuals, source_registry, simulation_entities]
    notes:
      - "This endpoint does NOT route through the simulation computation path (AR-006-C-001 — engine/overlay separation, non-negotiable)."
      - "confound_annotation is a required non-null field — null or empty is a validation failure."
      - "Human development indicator actuals receive no secondary-tier or optional treatment (AR-006-B-006)."
      - "Sparse observations: frontend must render broken lines for gaps, not interpolated segments."

  # ---------------------------------------------------------------------------
  # Grounding (ADR-016) — Component 1 and Component 2
  # ---------------------------------------------------------------------------
  - method: GET
    path: "/entities/{entity_id}/data-quality"
    summary: >
      Pre-creation data quality preview for an entity and year.
      Returns per-framework coverage metadata from entity_data_quality_coverage.
      Returns HTTP 200 with empty frameworks list for entities not in the registry
      (SF-1 guard — never 404 for an unknown entity_id).
    auth: none
    path_params:
      entity_id:
        type: string
        description: "ISO 3166-1 alpha-3 entity identifier (e.g. JOR, ZMB, GRC, EGY)"
    query_params:
      - name: year
        type: integer
        required: true
        description: "Scenario start year. Coverage rows are matched by coverage_year_from <= year AND (coverage_year_to IS NULL OR coverage_year_to >= year)."
    response:
      status: 200
      body:
        entity_id: {type: string, example: "JOR"}
        year: {type: integer, example: 2024}
        frameworks:
          type: array
          items:
            framework:
              type: string
              description: "Measurement framework key (e.g. financial, human_development, ecological)"
              example: "financial"
            confidence_tier:
              type: integer
              description: "DATA_STANDARDS.md confidence tier 1–5 (1=highest, 5=lowest)"
              example: 2
            source_institution:
              type: string
              nullable: true
              description: "Human-readable source name (e.g. IMF WEO / CBJ). Null when is_synthetic=true and no named source."
            data_vintage:
              type: string
              nullable: true
              description: "Vintage quarter string (e.g. 2024-Q1). Null when is_synthetic=true and no vintage."
            is_synthetic:
              type: boolean
              description: "True if data was statistically inferred from comparable economies rather than observed."
            synthetic_basis:
              type: string
              nullable: true
              description: "Description of the inference basis (e.g. 'SADC comparable economies 2022-2023'). Non-null when is_synthetic=true."
            loadable:
              type: boolean
              description: "True if the entity has registered source coverage in source_registry but data has not yet been pulled into entity_data_quality_coverage. Frontend displays a Load Data action when true."
            load_action_available:
              type: boolean
              description: "True when loadable is true. Signals the frontend to enable the POST /pull trigger."
    db_reads: [entity_data_quality_coverage, source_registry]
    notes:
      - "ADR-016 Component 1 — Entity Selection and Pre-Creation Data Quality Preview."
      - "M15-G4: three-tier response — (1) preloaded entity_data_quality_coverage rows (loadable: false); (2) source_registry registered coverage not yet pulled (loadable: true, load_action_available: true); (3) ADR-007 synthetic fallback (confidence_tier: 4, is_synthetic: true, loadable: false)."
      - "Source registry seeded for GRC, JOR, EGY, ZMB per ADR-016 §EL Decision 1. SEN seeded in M15-G4 migration (wb_wdi_sen_2022) as non-preloaded registered-source test case."
      - "Both financial and human_development frameworks must have coverage rows for all four M14 entities at year=2024."
      - "loadable: true signals the frontend to display the Load Data action. load_action_available: true when loadable is true."

  - method: GET
    path: "/scenarios/{scenario_id}/initial-state"
    summary: >
      Source-cited step-0 indicators for a completed scenario.
      Reads the step-0 snapshot state_data, parses SA-09 Quantity envelopes,
      and joins to source_registry for source attribution and vintage.
      Returns HTTP 200 with empty frameworks dict for scenarios with no
      source-registry-linked step-0 data (SF-2 guard — never 404 for a
      scenario that exists but has no grounding data).
    auth: none
    path_params:
      scenario_id:
        type: string
        format: uuid
        description: "Scenario UUID (FK to scenarios.scenario_id)"
    query_params: []
    response:
      status: 200
      body:
        scenario_id: {type: string, format: uuid, example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"}
        entity_id:
          type: string
          description: "Primary entity ID extracted from step-0 state_data. Empty string for scenarios with no entity data."
          example: "JOR"
        step_0_year:
          type: integer
          nullable: true
          description: "Calendar year of the step-0 snapshot timestep. Null if no snapshot exists."
          example: 2023
        frameworks:
          type: object
          description: >
            dict[framework_key, {indicators: [IndicatorObject]}].
            Empty dict ({}) for scenarios with no source-registry-linked data (SF-2).
          additionalProperties:
            type: object
            properties:
              indicators:
                type: array
                items:
                  name:
                    type: string
                    description: "Attribute key from state_data envelope (e.g. reserve_coverage_months)"
                    example: "reserve_coverage_months"
                  display_name:
                    type: string
                    description: "Human-readable indicator label for UI display (e.g. 'Reserve coverage')"
                    example: "Reserve coverage"
                  value:
                    type: number
                    nullable: true
                    description: "Numeric value (Decimal from SA-09 envelope, returned as float)"
                    example: 7.1
                  unit:
                    type: string
                    nullable: true
                    description: "Unit string from SA-09 envelope (e.g. months, ratio)"
                    example: "months"
                  source:
                    type: string
                    nullable: true
                    description: "source_registry.provider for the source_registry_id in the envelope. Null if no registry entry."
                    example: "CBJ"
                  vintage:
                    type: string
                    nullable: true
                    description: "YYYY-QN derived from source_registry.coverage_end. Null if no registry entry."
                    example: "2023-Q4"
                  confidence_tier:
                    type: integer
                    description: "DATA_STANDARDS.md confidence tier 1–5 from the SA-09 envelope"
                    example: 2
                  is_synthetic:
                    type: boolean
                    description: "True when the indicator value was inferred by SyntheticDataEngine (M16-G4 #22). False = primary source data."
                  synthetic_method:
                    type: "string|null"
                    description: "ADR-007 method used when is_synthetic=true. STRUCTURAL_ABSENCE = Method E (SAD badge); SYNTHETIC_COMPARABLE = Method B (T3/T4 badge); SYNTHETIC_MODEL = Method A (T4 badge). Null when is_synthetic=false."
                    enum: ["STRUCTURAL_ABSENCE", "SYNTHETIC_COMPARABLE", "SYNTHETIC_MODEL", null]
      status_404: "Scenario not found (scenario_id does not exist in scenarios table)"
    db_reads: [scenarios, scenario_state_snapshots, source_registry]
    notes:
      - "ADR-016 Component 2 — Scenario Grounding Strip backend."
      - "Step-0 snapshot is written by ScenarioSnapshotRepository.write_snapshot() during scenario run. Endpoint reads the first step=0 row ordered by id."
      - "SA-09 envelope format: _envelope_version, value (str-Decimal), unit, variable_type, confidence_tier, observation_date, source_registry_id, measurement_framework. See quantity_serde.py."
      - "source and vintage are derived from source_registry.provider and source_registry.coverage_end at read time — not stored in the state_data envelope."
      - "Persona 2 north star indicator: reserve_coverage_months in the financial framework must have non-null source and vintage (AC-7). This is the specific citation Persona 2 uses in an IMF negotiation input challenge."
      - "G4 frontend renders each indicator as: '[display_name]: [value] [unit] · [source · vintage · T{N}]' per ADR-016 §Component 2 UX-3."
      - "Authority: ARCH-REVIEW-006 AR-006-B-004/005/006; Issues #604, #605, #607."

  # ---------------------------------------------------------------------------
  # Grounding (M15-G4) — DA-G4-2, DA-G4-3, DA-G4-4
  # ---------------------------------------------------------------------------
  - method: POST
    path: "/entities/{entity_id}/pull"
    summary: >
      Trigger an async data pull job for a non-preloaded registered-source entity.
      M15 scope: populates entity_data_quality_coverage from source_registry metadata.
      Does NOT fetch live data from external APIs (M16+ capability).
      Status transitions: queued → running → complete | failed.
    auth: none
    path_params:
      entity_id:
        type: string
        description: "ISO 3166-1 alpha-3 entity identifier"
    query_params:
      - name: year
        type: integer
        required: true
        description: "Scenario start year for which to pull coverage data"
    response:
      status: 200
      body:
        job_id: {type: string, format: uuid}
        entity_id: {type: string}
        year: {type: integer}
        status: {type: string, enum: [queued, running, complete, failed]}
    db_reads: [source_registry]
    db_writes: [data_pull_jobs, entity_data_quality_coverage]
    notes:
      - "DA-G4-2: Async pull job pattern. Status transitions: queued → running → complete | failed."
      - "M15 implementation populates entity_data_quality_coverage from source_registry metadata only."
      - "Background task runs in FastAPI event loop via asyncio.create_task. Poll GET /pull/{job_id} for completion."

  - method: GET
    path: "/entities/{entity_id}/pull/{job_id}"
    summary: >
      Poll the status of a data pull job.
    auth: none
    path_params:
      entity_id:
        type: string
        description: "ISO 3166-1 alpha-3 entity identifier"
      job_id:
        type: string
        format: uuid
        description: "Pull job UUID returned from POST /pull"
    query_params: []
    response:
      status: 200
      body:
        job_id: {type: string, format: uuid}
        status: {type: string, enum: [queued, running, complete, failed]}
        frameworks_loaded: {type: "string[]", description: "Frameworks populated on complete status"}
        error: {type: string, nullable: true, description: "Error message on failed status"}
      status_404: "Pull job not found for the given entity_id and job_id combination"
    db_reads: [data_pull_jobs]
    notes:
      - "DA-G4-2: Poll this endpoint every 3 seconds until status is complete or failed."
      - "Returns 404 if job_id not found for the given entity_id."
      - "On complete: re-fetch GET /entities/{entity_id}/data-quality to see updated loadable=false rows."

  - method: GET
    path: "/scenarios/{scenario_id}/fidelity-context"
    summary: >
      Return the Chief Methodologist analogous-case contextualisation for the active scenario.
      Returns analogous_case: null for entities not in the CM mapping table (not an error).
    auth: none
    path_params:
      scenario_id:
        type: string
        format: uuid
        description: "Scenario UUID"
    query_params: []
    response:
      status: 200
      body:
        scenario_id: {type: string, format: uuid}
        entity_id: {type: string}
        analogous_case:
          type: object
          nullable: true
          properties:
            case_id: {type: string, example: "ARG"}
            case_name: {type: string, example: "Argentina 2001–2002"}
            mechanism_type: {type: string}
            mechanism_match: {type: string}
            directional_accuracy_validated: {type: boolean}
            magnitude_validated: {type: boolean}
            use_for: {type: string}
      status_404: "Scenario not found (scenario_id does not exist in scenarios table)"
    db_reads: [scenarios]
    notes:
      - "DA-G4-4: Rule-based entity→case mapping (CM Decision Gate 2, M15-G4 intent document)."
      - "Mapping table: ZMB→ARG (Argentina 2001–2002), JOR→GRC (Greece 2010–2012), EGY→ARG, GRC→GRC. All others→analogous_case: null."
      - "Returns 404 if scenario_id not found."
