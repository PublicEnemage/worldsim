[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "ANN",  # flake8-annotations (type hints)
    "S",    # flake8-bandit (security)
    "RET",  # flake8-return
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
]
ignore = [
    "ANN101",  # missing type for self — removed in ruff >=0.2.0; ignored for older ruff compat
    "ANN102",  # missing type for cls  — removed in ruff >=0.2.0; ignored for older ruff compat
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]  # allow assert in tests

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
# geoalchemy2 ships no py.typed or stubs; ignore at the import boundary.
module = "geoalchemy2.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
# asyncpg 0.30 ships no inline stubs; asyncpg-stubs is a separate package
# not pinned in requirements. Ignore until stubs are added.
module = "asyncpg.*"
ignore_missing_imports = true
